<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Live Screen</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.5); }
        .link-box { background: #2d2d2d; padding: 15px; border-radius: 8px; margin: 20px 0; }
        input { width: 70%; padding: 10px; font-size: 14px; text-align: center; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin-left: 10px; }
        button:hover { background: #0056b3; }
        video { width: 100%; max-height: 600px; background: #000; margin-top: 20px; border-radius: 8px; border: 2px solid #007bff; }
        #status { font-weight: bold; color: orange; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💻 Admin Panel (Screen Viewer)</h2>
        <p>Status: <span id="status">Connecting to server...</span></p>

        <div class="link-box" id="link-container" style="display: none;">
            <p><strong>यह लिंक कॉपी करें और User को भेजें:</strong></p>
            <input type="text" id="share-link" readonly>
            <button onclick="copyLink()">Copy Link</button>
        </div>

        <h3>🔴 Live User Screen:</h3>
        <video id="remote-video" autoplay playsinline controls></video>
    </div>

    <script>
        const peer = new Peer();
        let myAdminId = "";

        // Admin ID Generate aur Link Setup
        peer.on('open', (id) => {
            myAdminId = id;
            document.getElementById('status').innerText = "Online - Ready to receive screen";
            document.getElementById('status').style.color = "#00ff00";

            // Get current GitHub Pages URL base and append share.html with admin ID
            let currentUrl = window.location.href.split('?')[0];
            if (currentUrl.endsWith('/')) {
                currentUrl += 'index.html';
            }
            const shareUrl = currentUrl.replace('index.html', `share.html?admin=${myAdminId}`);
            
            document.getElementById('share-link').value = shareUrl;
            document.getElementById('link-container').style.display = "block";
        });

        // Jab User Screen Bheje, toh usko video tag me dikhana
        peer.on('call', (call) => {
            call.answer(); // Call receive ki
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        });

        // Copy Link Function
        function copyLink() {
            const copyText = document.getElementById("share-link");
            copyText.select();
            document.execCommand("copy");
            alert("✅ Link Copied! Ab ise user ko bhej dein.");
        }
    </script>
</body>
</html>
