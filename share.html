<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; text-align: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; margin-top: 20px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #218838; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 15px; font-weight: bold; color: #555; }
        video { width: 100%; border-radius: 8px; margin-top: 15px; background: #000; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📷 Live Camera</h2>
        <p>अपना लाइव कैमरा शेयर करने के लिए नीचे क्लिक करें।</p>
        
        <button id="share-btn" onclick="startCamera()">Start Camera</button>
        <p id="status">Waiting for action...</p>
        
        <video id="my-video" autoplay muted playsinline></video>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const adminId = urlParams.get('admin');
        
        // Match settings with Admin
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        if (!adminId) {
            document.getElementById('status').innerText = "❌ Error: Admin ID नहीं मिली।";
            document.getElementById('status').style.color = "red";
            document.getElementById('share-btn').disabled = true;
        }

        async function startCamera() {
            try {
                document.getElementById('status').innerText = "⏳ Camera Permission की प्रतीक्षा कर रहा है...";
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true 
                });
                
                const myVideo = document.getElementById('my-video');
                myVideo.srcObject = stream;
                myVideo.style.display = "block";

                document.getElementById('status').innerText = "⏳ Admin से कनेक्ट हो रहा है...";
                
                // Call admin ID
                peer.call(adminId, stream);

                document.getElementById('status').innerText = "✅ Camera Live है!";
                document.getElementById('status').style.color = "green";
                document.getElementById('share-btn').style.display = "none";

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "❌ Permission denied. कैमरा allow करें।";
                document.getElementById('status').style.color = "red";
            }
        }

        peer.on('error', (err) => {
            console.error(err);
            document.getElementById('status').innerText = `❌ Connection Error: ${err.type}`;
            document.getElementById('status').style.color = "red";
        });
    </script>
</body>
</html>
