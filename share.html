<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; text-align: center; padding: 20px; margin: 0; color: #333; }
        .card { background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 400px; margin: 40px auto; }
        h2 { color: #2c3e50; margin-top: 0; }
        p { color: #666; font-size: 15px; line-height: 1.5; }
        button { padding: 16px; font-size: 18px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #219150; box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        #status { margin-top: 20px; font-size: 16px; font-weight: bold; padding: 10px; border-radius: 6px; }
        video { width: 100%; border-radius: 10px; margin-top: 20px; background: #000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h2>📷 Secure Video Access</h2>
        <p>व्यवस्थापक (Admin) के साथ अपना लाइव कैमरा शेयर करने के लिए नीचे दिए गए बटन पर क्लिक करें और <strong>Allow</strong> चुनें।</p>
        
        <button id="share-btn" onclick="startCamera()">Start Camera</button>
        <div id="status" style="color: #f39c12;">Waiting for user action...</div>
        
        <video id="my-video" autoplay muted playsinline></video>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const adminId = urlParams.get('admin');
        const statusEl = document.getElementById('status');
        const shareBtn = document.getElementById('share-btn');
        
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        if (!adminId) {
            statusEl.innerText = "❌ Error: Admin ID is missing from URL.";
            statusEl.style.color = "#e74c3c";
            shareBtn.disabled = true;
        }

        async function startCamera() {
            try {
                shareBtn.innerText = "Requesting Access...";
                shareBtn.disabled = true;
                statusEl.innerText = "⏳ Please allow camera permission...";
                statusEl.style.color = "#f39c12";
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true 
                });
                
                const myVideo = document.getElementById('my-video');
                myVideo.srcObject = stream;
                myVideo.style.display = "block";

                statusEl.innerText = "⏳ Connecting to Admin...";
                
                peer.call(adminId, stream);

                statusEl.innerText = "✅ You are Live!";
                statusEl.style.color = "#27ae60";
                statusEl.style.background = "#eafaf1";
                shareBtn.style.display = "none";

            } catch (err) {
                console.error(err);
                statusEl.innerText = "❌ Permission denied. Please allow camera access.";
                statusEl.style.color = "#e74c3c";
                statusEl.style.background = "#fdedec";
                shareBtn.innerText = "Try Again";
                shareBtn.disabled = false;
            }
        }

        peer.on('error', (err) => {
            console.error(err);
            statusEl.innerText = `❌ Connection Error: ${err.type}`;
            statusEl.style.color = "#e74c3c";
        });
    </script>
</body>
</html>
