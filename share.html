<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Screen with Admin</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; text-align: center; padding: 50px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #218838; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 16px; font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin is Requesting Screen Access</h2>
        <p>अपनी स्क्रीन शेयर करने के लिए नीचे दिए गए बटन पर क्लिक करें और परमिशन <strong>Allow</strong> करें।</p>
        <button id="share-btn" onclick="startSharing()">Start Sharing Screen</button>
        <p id="status"></p>
    </div>

    <script>
        // URL se Admin ki ID nikalna
        const urlParams = new URLSearchParams(window.location.search);
        const adminId = urlParams.get('admin');
        const peer = new Peer();

        if (!adminId) {
            document.getElementById('status').innerText = "❌ Error: Link invalid hai. Admin ID nahi mili.";
            document.getElementById('status').style.color = "red";
            document.getElementById('share-btn').disabled = true;
        }

        async function startSharing() {
            try {
                // User ki screen record karne ki permission mangna
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                document.getElementById('status').innerText = "⏳ Connecting to Admin...";

                // Admin ko call lagana aur stream bhejna
                const call = peer.call(adminId, stream);

                document.getElementById('status').innerText = "✅ Screen is Live! Admin apki screen dekh rahe hain.";
                document.getElementById('status').style.color = "green";
                document.getElementById('share-btn').style.display = "none"; // Button hide kar do

                // Agar user "Stop Sharing" daba de browser me
                stream.getVideoTracks()[0].onended = function () {
                    document.getElementById('status').innerText = "🛑 Screen sharing stopped.";
                    document.getElementById('status').style.color = "red";
                    document.getElementById('share-btn').style.display = "inline-block";
                };

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "❌ Permission denied. Kripya screen share allow karein.";
                document.getElementById('status').style.color = "red";
            }
        }
    </script>
</body>
</html>
